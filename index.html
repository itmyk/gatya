<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運命の配属占い</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&display=swap');

        body {
            background-color: #050a15;
            color: #e0e0e0;
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a237e 0%, #050a15 70%);
            position: relative;
        }

        /* --- 浮遊エフェクトレイヤー --- */
        #effect-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5; /* 枠より後ろ、背景より前 */
        }

        .floating-text {
            position: absolute;
            font-weight: 900;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255,255,255,0.8); /* スマホで見やすく */
            animation: fluffyRise 1.2s ease-out forwards;
        }

        @keyframes fluffyRise {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; filter: blur(4px); }
            20% { opacity: 1; filter: blur(0px); }
            100% { transform: translate(0, -50px) scale(1.2); opacity: 0; filter: blur(8px); }
        }

        /* --- メインUI --- */
        .main-title {
            font-size: clamp(1.5rem, 8vw, 2.5rem);
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 0%, #4fc3f7 50%, #1565c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            z-index: 10;
        }

        #incantation {
            font-size: 0.85rem;
            color: #b3e5fc;
            margin-bottom: 20px;
            z-index: 10;
        }

        .display-container {
            position: relative;
            width: 85%;
            max-width: 500px;
            min-height: 180px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4fc3f7;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        #result {
            font-size: min(6.5vw, 2.2rem); 
            line-height: 1.5;
            text-align: center;
            color: #81d4fa;
            font-weight: 900;
            overflow-wrap: anywhere;
        }

        .decided {
            animation: magicAwaken 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: linear-gradient(to bottom, #fff 0%, #ffeb3b 40%, #f57c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: min(8vw, 2.8rem) !important;
        }

        @keyframes magicAwaken {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        #drawBtn {
            margin-top: 30px;
            background: transparent;
            color: #ffb74d;
            border: 2px solid #ffb74d;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            z-index: 10;
            border-radius: 50px;
        }

        /* カットイン */
        #cut-in {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; visibility: hidden; overflow: hidden;
            border-top: 2px solid #4fc3f7; border-bottom: 2px solid #4fc3f7;
        }
        #cut-in.active { height: 100px; visibility: visible; transition: height 0.2s; }
        #cut-in-text { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: 0.3rem; }
    </style>
</head>
<body>

    <div id="effect-layer"></div>

    <div id="cut-in"><div id="cut-in-text">見えた…！</div></div>

    <div class="main-title">運命の配属占い</div>
    <div id="incantation">未来が静かに胎動している...</div>
    
    <div class="display-container">
        <div id="result">Waiting...</div>
    </div>

    <button id="drawBtn" onclick="runFortuneTelling()">運命の扉を開く</button>

    <script>
        const departments = [
            "マーケティング局\n（ビジネスプロデュース付）",
            "ビジネストランスフォーメーション局",
            "マーケティング局",
            "データ・テクノロジーセンター",
            "リテールマーケティング局",
            "データマーケティング局",
            "CRプランニング局",
            "BXクリエイティブセンター",
            "CXクリエイティブセンター",
            "ラジオテレビ局",
            "関西ラジオテレビ＆コンテンツビジネス局",
            "新聞局",
            "出版ビジネスプロデュース局",
            "OOHビジネス室",
            "スポーツビジネスプロデュース局",
            "エンターテインメントビジネス・センター"
        ];

        let effectTimer;

        // スマホでも見える位置に文字を出す関数
        function spawnText() {
            const container = document.getElementById('effect-layer');
            const words = ["わくわく", "どきどき", "…っ！", "ドキドキ", "どこだ…", "頼む…！"];
            const span = document.createElement('span');
            span.innerText = words[Math.floor(Math.random() * words.length)];
            span.className = 'floating-text';
            
            // 出現位置を中央付近に制限（20%〜80%の間）
            span.style.left = (20 + Math.random() * 60) + '%';
            span.style.top = (30 + Math.random() * 40) + '%';
            
            span.style.color = span.innerText.includes("どき") ? "#ff80ab" : "#4fc3f7";
            span.style.fontSize = (1.0 + Math.random() * 0.5) + 'rem';
            
            container.appendChild(span);
            setTimeout(() => span.remove(), 1200);
        }

        function runFortuneTelling() {
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("drawBtn");
            const cutIn = document.getElementById("cut-in");
            
            btn.disabled = true;
            resultDiv.classList.remove("decided");
            document.getElementById("incantation").innerText = "可能性が一点に集約していく...";

            // 文字を出す演出開始
            effectTimer = setInterval(spawnText, 150);

            let startTime = Date.now();
            const timer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                resultDiv.innerText = departments[Math.floor(Math.random() * departments.length)].replace('\n', '');

                if (elapsed >= 2200) {
                    clearInterval(timer);
                    clearInterval(effectTimer); // 演出終了
                    
                    cutIn.classList.add("active");

                    setTimeout(() => {
                        cutIn.classList.remove("active");
                        
                        const final = departments[Math.floor(Math.random() * departments.length)];
                        resultDiv.innerText = final;
                        resultDiv.classList.add("decided");
                        document.getElementById("incantation").innerText = "── 運命が決した ──";
                        
                        confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 } });

                        btn.disabled = false;
                        btn.innerText = "運命を塗り替える";
                    }, 800);
                }
            }, 80);
        }
    </script>
</body>
</html>
