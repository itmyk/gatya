<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運命の配属占い</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@700;900&display=swap');

        body {
            background-color: #050a15;
            color: #e0e0e0;
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a237e 0%, #050a15 70%);
            position: relative;
        }

        /* スクリーンシェイク */
        .shake { animation: screenShake 0.4s ease-in-out; }
        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) translateY(5px); }
            50% { transform: translateX(10px) translateY(-5px); }
            75% { transform: translateX(-5px) translateY(5px); }
        }

        /* --- カットイン演出（修正：初期状態を完全に見えなくする） --- */
        #cut-in {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            overflow: hidden;
            pointer-events: none;
            /* 初期状態では境界線も透明に */
            border-top: 2px solid transparent;
            border-bottom: 2px solid transparent;
            opacity: 0;
            visibility: hidden;
            transition: height 0.2s ease, opacity 0.1s ease;
        }

        #cut-in.active {
            height: 180px;
            opacity: 1;
            visibility: visible;
            border-top: 2px solid #4fc3f7;
            border-bottom: 2px solid #4fc3f7;
            animation: cutInBounce 0.4s ease-out;
        }

        #cut-in-text {
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1.5rem;
            text-shadow: 0 0 20px #4fc3f7, 0 0 40px #1a237e;
            transform: skewX(-20deg);
            opacity: 0;
        }

        #cut-in.active #cut-in-text {
            animation: textIn 0.4s 0.1s forwards;
        }

        @keyframes cutInBounce {
            0% { width: 0; }
            50% { width: 120%; }
            100% { width: 100%; }
        }

        @keyframes textIn {
            0% { transform: translate(100px, 0) skewX(-20deg); opacity: 0; }
            100% { transform: translate(0, 0) skewX(-20deg); opacity: 1; }
        }

        /* --- UIパーツ --- */
        .main-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 0%, #4fc3f7 50%, #1565c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 0 15px rgba(79, 195, 247, 0.5));
            z-index: 10;
        }

        #incantation {
            font-size: 1.1rem;
            color: #b3e5fc;
            height: 1.5rem;
            margin-bottom: 15px;
            font-style: italic;
            opacity: 0.7;
            z-index: 10;
        }

        .display-container {
            position: relative;
            width: 80%;
            max-width: 800px;
            height: 250px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4fc3f7;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.4), inset 0 0 30px rgba(0, 188, 212, 0.2);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .magic-circle {
            position: absolute;
            width: 0; height: 0;
            border: 2px solid #fff;
            border-radius: 50%;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }
        .magic-circle-anim { animation: circleExpand 0.8s ease-out forwards; }

        @keyframes circleExpand {
            0% { width: 0; height: 0; opacity: 1; border-width: 10px; }
            100% { width: 1000px; height: 1000px; opacity: 0; border-width: 1px; }
        }

        #result {
            font-size: 2.5rem;
            text-align: center;
            padding: 20px;
            color: #81d4fa;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(129, 212, 250, 0.5);
        }

        .decided {
            animation: magicAwaken 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: linear-gradient(to bottom, #fff 0%, #ffeb3b 40%, #f57c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.5rem !important;
            filter: drop-shadow(0 0 20px rgba(255, 235, 59, 0.8));
        }

        @keyframes magicAwaken {
            0% { transform: scale(0.3); filter: brightness(5) blur(10px); }
            70% { transform: scale(1.1); filter: brightness(2) blur(0px); }
            100% { transform: scale(1); filter: brightness(1) blur(0px); }
        }

        #drawBtn {
            margin-top: 40px;
            background: transparent;
            color: #ffb74d;
            border: 2px solid #ffb74d;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #drawBtn:hover {
            background: rgba(255, 183, 77, 0.1);
            box-shadow: 0 0 30px rgba(255, 181, 77, 0.6);
            transform: scale(1.05);
        }

        .floating-text {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            z-index: 5;
            animation: fluffyFade 1.5s ease-out forwards;
        }

        @keyframes fluffyFade {
            0% { transform: translate(0, 0) scale(0.8) rotate(var(--initial-rotate)); opacity: 0; filter: blur(8px); }
            30% { transform: translate(0, -10px) scale(1) rotate(var(--initial-rotate)); opacity: 0.7; filter: blur(0px); }
            100% { transform: translate(0, -30px) scale(1.2) rotate(var(--initial-rotate)); opacity: 0; filter: blur(12px); }
        }

        .flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 300;
        }
        .flash-anim { animation: flashEffect 0.4s ease-out; }
        @keyframes flashEffect {
            0% { opacity: 0.9; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="effect-layer"></div>
    <div class="flash" id="flash-effect"></div>
    <div class="magic-circle" id="magic-circle"></div>

    <div id="cut-in">
        <div id="cut-in-text">見えた…！</div>
    </div>

    <div class="main-title">運命の配属占い</div>
    <div id="incantation">未来が静かに胎動している...</div>
    
    <div class="display-container" id="container">
        <div id="result">Waiting...</div>
    </div>

    <button id="drawBtn" onclick="runFortuneTelling()">運命の扉を開く</button>

    <script>
        const departments = [
            "マーケティング局（ビジネスプロデュース付）",
            "ビジネストランスフォーメーション局",
            "マーケティング局",
            "データ・テクノロジーセンター",
            "リテールマーケティング局",
            "データマーケティング局",
            "CRプランニング局",
            "BXクリエイティブセンター",
            "CXクリエイティブセンター",
            "ラジオテレビ局",
            "関西ラジオテレビ＆コンテンツビジネス局",
            "新聞局",
            "出版ビジネスプロデュース局",
            "OOHビジネス室",
            "スポーツビジネスプロデュース局",
            "エンターテインメントビジネス・センター"
        ];

        let effectTimer;

        function spawnText() {
            const container = document.getElementById('effect-layer');
            const words = ["わくわく", "どきどき", "…っ！", "ドキドキ", "どこだ…", "頼む…！", "そわそわ"];
            const span = document.createElement('span');
            span.innerText = words[Math.floor(Math.random() * words.length)];
            span.className = 'floating-text';
            span.style.left = (10 + Math.random() * 80) + '%';
            span.style.top = (10 + Math.random() * 80) + '%';
            span.style.setProperty('--initial-rotate', (Math.random() - 0.5) * 40 + 'deg');
            span.style.color = span.innerText.includes("どき") || span.innerText.includes("頼む") ? "#ff80ab" : "#4fc3f7";
            span.style.fontSize = (Math.random() * 1.5 + 1.2) + 'rem';
            container.appendChild(span);
            setTimeout(() => span.remove(), 1500);
        }

        function runFortuneTelling() {
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("drawBtn");
            const incant = document.getElementById("incantation");
            const flash = document.getElementById("flash-effect");
            const circle = document.getElementById("magic-circle");
            const cutIn = document.getElementById("cut-in");
            
            btn.disabled = true;
            resultDiv.classList.remove("decided");
            incant.innerText = "可能性が一点に集約していく...";

            effectTimer = setInterval(spawnText, 100);

            let duration = 2500; 
            let startTime = Date.now();

            const timer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                resultDiv.innerText = departments[Math.floor(Math.random() * departments.length)];

                if (elapsed >= duration) {
                    clearInterval(timer);
                    clearInterval(effectTimer); 
                    
                    // カットイン発動
                    cutIn.classList.add("active");

                    setTimeout(() => {
                        cutIn.classList.remove("active");
                        
                        flash.classList.add("flash-anim");
                        document.body.classList.add("shake");
                        circle.classList.add("magic-circle-anim");

                        finalize();

                        setTimeout(() => {
                            flash.classList.remove("flash-anim");
                            document.body.classList.remove("shake");
                            circle.classList.remove("magic-circle-anim");
                        }, 800);
                    }, 800);
                }
            }, 80);

            function finalize() {
                const finalChoice = departments[Math.floor(Math.random() * departments.length)];
                resultDiv.innerText = finalChoice;
                resultDiv.classList.add("decided");
                
                incant.innerText = "── 運命の導きが決した ──";
                btn.innerText = "運命を塗り替える（もう一度！）";
                btn.disabled = false;

                const count = 200;
                const defaults = { origin: { y: 0.7 } };
                function fire(ratio, opts) {
                    confetti(Object.assign({}, defaults, opts, { particleCount: Math.floor(count * ratio) }));
                }
                fire(0.25, { spread: 26, startVelocity: 55 });
                fire(0.2, { spread: 60 });
                fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
                fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
                fire(0.1, { spread: 120, startVelocity: 45 });
            }
        }
    </script>
</body>
</html>
