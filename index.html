<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運命の配属占い - 極 -</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@700;900&display=swap');

        body {
            background-color: #010307;
            color: #e0e0e0;
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- 厳かな背景演出（魔法陣） --- */
        .magic-bg-circle {
            position: absolute;
            width: 800px;
            height: 800px;
            border: 1px solid rgba(79, 195, 247, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateCircle 40s linear infinite;
            z-index: -1;
        }
        .magic-bg-circle::before {
            content: "";
            position: absolute;
            width: 90%; height: 90%;
            border: 2px dashed rgba(79, 195, 247, 0.1);
            border-radius: 50%;
        }

        @keyframes rotateCircle {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 深淵のグラデーション */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0d1b3e 0%, #010307 80%);
            z-index: -2;
        }

        /* 周辺減光（厳かさを出す影） */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* スクリーンシェイク */
        .shake { animation: screenShake 0.4s ease-in-out; }
        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            50% { transform: translateX(12px); }
            75% { transform: translateX(-6px); }
        }

        /* --- カットイン演出 --- */
        #cut-in {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            overflow: hidden;
            pointer-events: none;
            border-top: 2px solid transparent;
            border-bottom: 2px solid transparent;
            opacity: 0;
            visibility: hidden;
        }

        #cut-in.active {
            height: 200px;
            opacity: 1;
            visibility: visible;
            border-top: 2px solid #ffd700; /* 金色の境界線 */
            border-bottom: 2px solid #ffd700;
            animation: cutInBounce 0.4s ease-out;
        }

        #cut-in-text {
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2rem;
            text-shadow: 0 0 20px #ffd700, 0 0 50px #ff8f00;
            transform: skewX(-15deg);
            opacity: 0;
        }

        #cut-in.active #cut-in-text {
            animation: textIn 0.4s 0.1s forwards;
        }

        @keyframes cutInBounce {
            0% { width: 0; }
            100% { width: 100%; }
        }

        @keyframes textIn {
            0% { transform: translate(150px, 0) skewX(-15deg); opacity: 0; }
            100% { transform: translate(0, 0) skewX(-15deg); opacity: 1; }
        }

        /* --- UIパーツ --- */
        .main-title {
            font-size: 2.2rem;
            margin-bottom: 25px;
            background: linear-gradient(to bottom, #ffffff 0%, #b3e5fc 50%, #4fc3f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: 0.5rem;
            z-index: 10;
        }

        .display-container {
            position: relative;
            width: 85%;
            max-width: 900px;
            height: 280px;
            background: rgba(0, 5, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #result {
            font-size: 2.2rem;
            text-align: center;
            padding: 20px;
            color: #90caf9;
            font-weight: 900;
            opacity: 0.5;
        }

        .decided {
            animation: magicAwaken 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: linear-gradient(to bottom, #fff 0%, #ffd700 40%, #ff8f00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.8rem !important;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
            opacity: 1 !important;
        }

        @keyframes magicAwaken {
            0% { transform: scale(0.5); filter: brightness(5); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        #drawBtn {
            margin-top: 50px;
            background: transparent;
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s;
            z-index: 10;
            letter-spacing: 0.3rem;
        }

        #drawBtn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        #drawBtn:disabled { opacity: 0.3; cursor: default; }

        /* 消える「心の声」 */
        .floating-text {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            z-index: 5;
            animation: fluffyFade 1.6s ease-out forwards;
        }

        @keyframes fluffyFade {
            0% { transform: translateY(0) scale(0.8); opacity: 0; filter: blur(10px); }
            40% { transform: translateY(-20px) scale(1); opacity: 0.6; filter: blur(0px); }
            100% { transform: translateY(-50px) scale(1.3); opacity: 0; filter: blur(15px); }
        }

        .flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 300;
        }
        .flash-anim { animation: flashEffect 0.5s ease-out; }
        @keyframes flashEffect {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="magic-bg-circle"></div>
    <div id="effect-layer"></div>
    <div class="flash" id="flash-effect"></div>

    <div id="cut-in">
        <div id="cut-in-text">見えた…！</div>
    </div>

    <div class="main-title">運命の配属占い</div>
    
    <div class="display-container" id="container">
        <div id="result">── 刻を待て ──</div>
    </div>

    <button id="drawBtn" onclick="runFortuneTelling()">運命の扉を開く</button>

    <script>
        const departments = [
            "マーケティング局（ビジネスプロデュース付）",
            "ビジネストランスフォーメーション局",
            "マーケティング局",
            "データ・テクノロジーセンター",
            "リテールマーケティング局",
            "データマーケティング局",
            "CRプランニング局",
            "BXクリエイティブセンター",
            "CXクリエイティブセンター",
            "ラジオテレビ局",
            "関西ラジオテレビ＆コンテンツビジネス局",
            "新聞局",
            "出版ビジネスプロデュース局",
            "OOHビジネス室",
            "スポーツビジネスプロデュース局",
            "エンターテインメントビジネス・センター"
        ];

        let effectTimer;

        function spawnText() {
            const container = document.getElementById('effect-layer');
            const words = ["わくわく", "どきどき", "…っ！", "どこだ…", "頼む…！", "静まれ…"];
            const span = document.createElement('span');
            span.innerText = words[Math.floor(Math.random() * words.length)];
            span.className = 'floating-text';
            span.style.left = (15 + Math.random() * 70) + '%';
            span.style.top = (20 + Math.random() * 60) + '%';
            span.style.color = span.innerText.includes("頼む") ? "#ffd700" : "#4fc3f7";
            span.style.fontSize = (Math.random() * 1.5 + 1.2) + 'rem';
            container.appendChild(span);
            setTimeout(() => span.remove(), 1600);
        }

        function runFortuneTelling() {
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("drawBtn");
            const flash = document.getElementById("flash-effect");
            const cutIn = document.getElementById("cut-in");
            
            btn.disabled = true;
            resultDiv.classList.remove("decided");
            resultDiv.style.opacity = "1";

            effectTimer = setInterval(spawnText, 120);

            let duration = 3000; 
            let startTime = Date.now();

            const timer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                resultDiv.innerText = departments[Math.floor(Math.random() * departments.length)];

                if (elapsed >= duration) {
                    clearInterval(timer);
                    clearInterval(effectTimer); 
                    
                    // カットイン発動
                    cutIn.classList.add("active");

                    setTimeout(() => {
                        cutIn.classList.remove("active");
                        
                        // 決定時の衝撃
                        flash.classList.add("flash-anim");
                        document.body.classList.add("shake");

                        finalize();

                        setTimeout(() => {
                            flash.classList.remove("flash-anim");
                            document.body.classList.remove("shake");
                        }, 800);
                    }, 800);
                }
            }, 80);

            function finalize() {
                const finalChoice = departments[Math.floor(Math.random() * departments.length)];
                resultDiv.innerText = finalChoice;
                resultDiv.classList.add("decided");
                
                btn.innerText = "運命を再構築する";
                btn.disabled = false;

                // 豪華な紙吹雪（ゴールド＆シルバー系）
                confetti({
                    particleCount: 200,
                    spread: 90,
                    origin: { y: 0.6 },
                    colors: ['#ffd700', '#ffffff', '#ff8f00']
                });
            }
        }
    </script>
</body>
</html>
