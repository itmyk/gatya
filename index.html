<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運命の配属占い</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&display=swap');

        body {
            background-color: #050a15;
            color: #e0e0e0;
            font-family: 'Noto Serif JP', serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a237e 0%, #050a15 70%);
            position: relative;
        }

        /* --- UIパーツ --- */
        .main-title {
            font-size: clamp(1.5rem, 8vw, 2.5rem); /* 画面幅に合わせて伸縮 */
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 0%, #4fc3f7 50%, #1565c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-align: center;
            z-index: 10;
        }

        #incantation {
            font-size: 0.85rem;
            color: #b3e5fc;
            margin-bottom: 20px;
            min-height: 1.2rem;
            z-index: 10;
            text-align: center;
        }

        .display-container {
            position: relative;
            width: 85%;
            max-width: 500px;
            /* 高さを固定せず、中身に合わせる */
            min-height: 200px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4fc3f7;
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        #result {
            /* ★最重要：文字がはみ出さない魔法の1行 */
            font-size: min(6.5vw, 2.2rem); 
            line-height: 1.5;
            text-align: center;
            color: #81d4fa;
            font-weight: 900;
            word-break: break-all; /* どこでも改行を許可 */
            overflow-wrap: anywhere;
            width: 100%;
        }

        .decided {
            animation: magicAwaken 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: linear-gradient(to bottom, #fff 0%, #ffeb3b 40%, #f57c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* 決定時は少し大きく、でもはみ出さない範囲で */
            font-size: min(8vw, 2.8rem) !important;
            filter: drop-shadow(0 0 15px rgba(255, 235, 59, 0.6));
        }

        #drawBtn {
            margin-top: 30px;
            background: transparent;
            color: #ffb74d;
            border: 2px solid #ffb74d;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            z-index: 10;
            border-radius: 50px;
            transition: 0.2s;
        }

        #drawBtn:active { transform: scale(0.95); }

        /* --- 演出用レイヤー --- */
        #cut-in {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; visibility: hidden; overflow: hidden;
            border-top: 2px solid #4fc3f7; border-bottom: 2px solid #4fc3f7;
        }
        #cut-in.active { height: 100px; visibility: visible; transition: height 0.2s; }
        #cut-in-text { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: 0.3rem; }

        @keyframes magicAwaken {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating-text {
            position: absolute; font-size: 0.9rem; pointer-events: none;
            animation: fadeUp 1s ease-out forwards; z-index: 5;
        }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="effect-layer"></div>
    <div id="cut-in"><div id="cut-in-text">見えた…！</div></div>

    <div class="main-title">運命の配属占い</div>
    <div id="incantation">未来が静かに胎動している...</div>
    
    <div class="display-container">
        <div id="result">Waiting...</div>
    </div>

    <button id="drawBtn" onclick="runFortuneTelling()">運命の扉を開く</button>

    <script>
        const departments = [
            "マーケティング局\n（ビジネスプロデュース付）",
            "ビジネストランスフォーメーション局",
            "マーケティング局",
            "データ・テクノロジーセンター",
            "リテールマーケティング局",
            "データマーケティング局",
            "CRプランニング局",
            "BXクリエイティブセンター",
            "CXクリエイティブセンター",
            "ラジオテレビ局",
            "関西ラジオテレビ＆コンテンツビジネス局",
            "新聞局",
            "出版ビジネスプロデュース局",
            "OOHビジネス室",
            "スポーツビジネスプロデュース局",
            "エンターテインメントビジネス・センター"
        ];

        function runFortuneTelling() {
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("drawBtn");
            const cutIn = document.getElementById("cut-in");
            
            btn.disabled = true;
            resultDiv.classList.remove("decided");
            document.getElementById("incantation").innerText = "可能性が一点に集約していく...";

            let startTime = Date.now();
            const timer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                resultDiv.innerText = departments[Math.floor(Math.random() * departments.length)].replace('\n', '');

                if (elapsed >= 2000) {
                    clearInterval(timer);
                    cutIn.classList.add("active");

                    setTimeout(() => {
                        cutIn.classList.remove("active");
                        document.body.classList.add("shake");
                        
                        const final = departments[Math.floor(Math.random() * departments.length)];
                        resultDiv.innerText = final;
                        resultDiv.classList.add("decided");
                        document.getElementById("incantation").innerText = "── 運命が決した ──";
                        
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

                        setTimeout(() => {
                            document.body.classList.remove("shake");
                            btn.disabled = false;
                            btn.innerText = "もう一度占う";
                        }, 500);
                    }, 800);
                }
            }, 70);
        }
    </script>
</body>
</html>
